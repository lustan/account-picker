<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Account Picker Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="primary-rail">
      <div class="brand">AP</div>
      <button class="rail-item active" id="nav-account" title="Account Management">
        <span>👤</span>
      </button>
      <button class="rail-item" id="nav-env" title="Environment Management">
        <span>🌐</span>
      </button>
    </aside>

    <aside class="directory-panel">
      <div class="directory-title">Directory</div>
      <div class="directory-subtitle" id="directorySubtitle">Groups</div>
      <div id="directoryList" class="directory-list"></div>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <div>
          <div class="breadcrumbs">Account Management <span>›</span> <b id="breadcrumbCurrent">All</b></div>
          <h1 id="pageTitle">Account & Environment Management</h1>
        </div>
        <button class="btn-primary" id="addNewBtn">Add New</button>
      </header>

      <section class="search-filter-bar">
        <input id="searchInput" class="search-input" placeholder="Search username, remark, or environment URL" />
        <div id="filterChips" class="filter-chips"></div>
      </section>

      <section id="account-section" class="content-card">
        <div id="accountList"></div>
      </section>

      <section id="env-section" class="content-card" style="display:none;">
        <div id="envList"></div>
      </section>
    </main>
  </div>

  <div id="addModalMask" class="modal-mask"></div>
  <div id="addModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <h3 id="modalTitle">Add New</h3>
      <button id="modalClose" class="icon-btn">✕</button>
    </div>
    <div class="modal-body" id="modalFields"></div>
    <div class="modal-footer">
      <button id="modalCancel" class="btn-ghost">Cancel</button>
      <button id="modalSave" class="btn-primary">Save</button>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
